# ============================================================
# DEV Profile — File-Based H2 Database (data persists on disk)
# ============================================================

# ── H2 File-Based Datasource ──────────────────────────────────────────────────
# Data is saved to ./data/studentclubdb.mv.db next to the project root.
# Change the path if you want it stored elsewhere.
spring.datasource.url=jdbc:h2:file:./data/studentclubdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ── H2 Web Console (accessible at http://localhost:8080/h2-console) ───────────
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
# Allow the console to be reached from other machines on the LAN
spring.h2.console.settings.web-allow-others=true

# ── HikariCP Connection Pool ──────────────────────────────────────────────────
# Prevents idle-timeout disconnections and keeps the pool healthy.
spring.datasource.hikari.pool-name=StudentClubHikariPool
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.maximum-pool-size=10
# How long (ms) a connection can sit idle before being retired (10 min)
spring.datasource.hikari.idle-timeout=600000
# Max lifetime of any connection in the pool (30 min) — must be < DB wait_timeout
spring.datasource.hikari.max-lifetime=1800000
# How long to wait for a connection from the pool before throwing (30 s)
spring.datasource.hikari.connection-timeout=30000
# Heartbeat query to validate connections before handing them out
spring.datasource.hikari.connection-test-query=SELECT 1
# Keep-alive ping interval (5 min) — prevents the DB from dropping idle connections
spring.datasource.hikari.keepalive-time=300000
