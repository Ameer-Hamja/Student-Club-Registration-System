# ─────────────────────────────────────────────────────────────────────────────
# Technical Event Hub — application.properties
#
# Default profile: prod (MySQL on localhost:3306)
# To run with H2 in-memory instead:  -Dspring.profiles.active=dev
# ─────────────────────────────────────────────────────────────────────────────
# Bind to all interfaces so other devices on the LAN can reach the server
# (e.g. http://192.168.x.x:8080)
server.port=8080
server.address=0.0.0.0

# ── MySQL ─────────────────────────────────────────────────────────────────────
# ⚠️  Change the password below to match your MySQL Workbench root password.
# If your root user has no password, leave it blank.
spring.datasource.url=jdbc:mysql://localhost:3306/student_club_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=ameer2005
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ── JWT ───────────────────────────────────────────────────────────────────────
jwt.secret=TechnicalEventHubSuperSecretKey2026XYZ!@#$%^&*()_+
jwt.expiration=86400000

# ── Jackson ───────────────────────────────────────────────────────────────────
spring.jackson.serialization.WRITE_DATES_AS_TIMESTAMPS=false

# ── File Upload ───────────────────────────────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=uploads/events

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.example.studentclubbooking=INFO
logging.level.org.springframework.security=WARN